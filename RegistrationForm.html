<!DOCTYPE html>
<html>
    <head>
        <title>
            Registration Form
        </title>
        <script type="text/javascript" src="j1.js"></script>
        <link rel="stylesheet" href="c1.css">
    </head>
    <body>
        <nav>
            <a href="index.html">|Home|</a>
            <a href="About.html">|About|</a>
            <a href="Next.html">|Stationery|</a>
            <a href="Order.html">|Place Order|</a>
            <a href="subjects.html">|Subjects|</a>
            <a href="contact.html">|Contact|</a>
        </nav>

        <form onsubmit="return SubmitForm()" action="About.html">
            <h1 style="text-align: center; margin-top: 20px; color: black; text-decoration: rgb(60, 57, 104) dotted underline;">
                Registration Form for Students
            </h1>
            <label>
                Student Name
            </label>
            <input type="text" id="Fname" placeholder="First Name">
            <input type="text" id="Mname" placeholder="Middle Name">
            <input type="text" id="Lname" placeholder="Last Name">
            <br><br>
            <label>
                Student Email
            </label>
            <input type="email" id="email" placeholder="Enter your Email ID">
            <label>
                Student Phone Number
            </label>
            <input type="tel" id="phone" placeholder="Enter your Phone Number">
            <label>
                Date of Birth
            </label>
            <input type="date" id="date">
            <label>
               <br><br>Password
            </label>
            <input type="password" id="password" placeholder="Enter your Password">
            <button type="submit" style="width: 100%;">
                Submit
            </button>
        </form>
    </body>
</html>
